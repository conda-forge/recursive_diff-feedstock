{% set version = "1.3.0" %}

package:
  name: recursive_diff
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/recursive_diff/recursive_diff-{{ version }}.tar.gz
  sha256: 9a6653b9e793d0ac6bd173c9e0f2c74dd46cee3628a5facbf3f6075e174de032

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - ncdiff = recursive_diff.ncdiff:main

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - numpy >=1.23
    - pandas >=1.5
    - xarray >=2023.8.0

test:
  imports:
    - recursive_diff
  requires:
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/crusaderky/recursive_diff
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Recursively compare two Python data structures

extra:
  recipe-maintainers:
    - crusaderky
